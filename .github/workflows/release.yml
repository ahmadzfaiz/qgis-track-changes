name: Release

on:
  push:
    branches-ignore:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensure full commit history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release

      - name: Generate Changelog
        run: semantic-release changelog

      - name: Commit and Push Changelog
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Ensure CHANGELOG.md exists and changes are staged
          if git diff --exit-code CHANGELOG.md >/dev/null; then
            echo "No changes in changelog, skipping commit."
            exit 0
          fi

          git add CHANGELOG.md
          git commit -m "chore(release): update changelog"

          # Push changes using GITHUB_TOKEN
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
